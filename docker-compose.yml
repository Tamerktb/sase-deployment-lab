x-services:
  # Common labels for all SASE containers
  sase-common: &sase-common
    networks:
      sase_mesh: {}

  # cloudflared base config
  cloudflared-base: &cloudflared-base
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    networks:
      sase_mesh: {}
    depends_on:
      wireguard-hub:
        condition: service_started
    # To activate: set TUNNEL_TOKEN environment variable or mount tunnel credentials
    #   export CF_TUNNEL_TOKEN_SITEA=your-token-here
    #   docker compose up -d site-a-tunnel
    command:
      - tunnel
      - --no-autoupdate
      - run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN_SITEA:-}

services:
  # ── Site-A (Amman, Jordan) ──────────────────────────────────
  site-a-web:
    <<: *sase-common
    image: nginx:alpine
    container_name: sase-site-a-web
    networks:
      sase_mesh:
        ipv4_address: 10.0.1.10
    volumes:
      - ./demo/scenario-1-basic-access.md:/usr/share/nginx/html/scenario-1.html:ro
    labels:
      sase.site: "site-a"
      sase.location: "Amman, Jordan"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  site-a-api:
    <<: *sase-common
    image: python:3.12-alpine
    container_name: sase-site-a-api
    networks:
      sase_mesh:
        ipv4_address: 10.0.1.20
    command: >
      sh -c "python -m http.server 8080 & sleep infinity"
    labels:
      sase.site: "site-a"

  # cloudflared connects Site-A services to Cloudflare Zero Trust
  site-a-tunnel:
    <<: *cloudflared-base
    container_name: sase-site-a-tunnel
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN_SITEA:-}
    labels:
      sase.site: "site-a"
      sase.role: "cloudflared-tunnel"

  # ── Site-B (Dubai, UAE) ─────────────────────────────────────
  site-b-web:
    <<: *sase-common
    image: nginx:alpine
    container_name: sase-site-b-web
    networks:
      sase_mesh:
        ipv4_address: 10.0.2.10
    labels:
      sase.site: "site-b"
      sase.location: "Dubai, UAE"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  site-b-db:
    <<: *sase-common
    image: postgres:16-alpine
    container_name: sase-site-b-db
    networks:
      sase_mesh:
        ipv4_address: 10.0.2.20
    environment:
      POSTGRES_USER: sase
      POSTGRES_PASSWORD: sase_demo_pass
      POSTGRES_DB: sase_demo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sase -d sase_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

  site-b-tunnel:
    <<: *cloudflared-base
    container_name: sase-site-b-tunnel
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN_SITEB:-}
    labels:
      sase.site: "site-b"
      sase.role: "cloudflared-tunnel"

  # ── Hub (AWS eu-central-1) ──────────────────────────────────
  hub-monitor:
    <<: *sase-common
    image: nginx:alpine
    container_name: sase-hub-monitor
    networks:
      sase_mesh:
        ipv4_address: 10.0.0.10
    ports:
      - "9090:80"
    labels:
      sase.site: "hub"
      sase.location: "AWS eu-central-1"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  hub-tunnel:
    <<: *cloudflared-base
    container_name: sase-hub-tunnel
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN_HUB:-}
    labels:
      sase.site: "hub"
      sase.role: "cloudflared-tunnel"

  # ── WireGuard Hub (site-to-site mesh) ───────────────────────
  wireguard-hub:
    <<: *sase-common
    image: linuxserver/wireguard:latest
    container_name: sase-wg-hub
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      sase_mesh:
        ipv4_address: 10.0.0.2
    ports:
      - "51821:51820/udp"
    volumes:
      - ./wireguard/sites/hub:/config:ro

  # ── Posture & Compliance Gateway ────────────────────────────
  posture-gateway:
    <<: *sase-common
    image: nginx:alpine
    container_name: sase-posture-gateway
    networks:
      sase_mesh:
        ipv4_address: 10.0.0.254
    ports:
      - "8443:443"
    labels:
      sase.role: "posture-gateway"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  sase_mesh:
    driver: bridge
    ipam:
      config:
        - subnet: "10.0.0.0/16"
