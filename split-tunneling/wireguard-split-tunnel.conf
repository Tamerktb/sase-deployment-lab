# SASE WireGuard Split-Tunneling Configuration
# Only corporate traffic (10.0.0.0/8) goes through the WireGuard tunnel.
# Everything else (0.0.0.0/1 and 128.0.0.0/1) bypasses.
#
# Install: Place in /etc/wireguard/wg-split.conf
# Activate: wg-quick up wg-split

[Interface]
PrivateKey = CLIENT_PRIVATE_KEY
Address = 10.0.100.2/24
DNS = 1.1.1.1, 1.0.0.1
Table = off
PostUp = ip rule add from 10.0.100.2 table 200
PostUp = ip route add 10.0.0.0/8 dev wg-split table 200
PostUp = ip route add default via $(ip route show default | awk '{print $3}') table 200 priority 100
PostDown = ip rule del from 10.0.100.2 table 200

[Peer]
PublicKey = SASE_HUB_PUBLIC_KEY
Endpoint = hub.sase.example.com:51820
# Only corporate IPs go through WireGuard
AllowedIPs = 10.0.0.0/8
PersistentKeepalive = 25
