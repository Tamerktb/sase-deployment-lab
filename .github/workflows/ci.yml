name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Validate Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6"

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -diff || echo "terraform fmt failed"

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Verify containers
        run: |
          for c in sase-site-a-web sase-site-a-api sase-site-b-web sase-site-b-db sase-hub-monitor sase-wg-hub sase-posture-gateway; do
            docker ps --format '{{.Names}}' | grep -q "^$c$" && echo "[OK] $c" || (echo "[FAIL] $c" && exit 1)
          done

      - name: Network connectivity check
        run: |
          docker exec sase-site-a-web ping -c 1 -W 2 10.0.1.20 || echo "(expected intra-site)"
          docker exec sase-site-b-web ping -c 1 -W 2 10.0.2.20 || echo "(expected intra-site)"

      - name: Teardown
        if: always()
        run: docker compose down --volumes --remove-orphans
